{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 在线考试系统</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <h1>在线考试系统</h1>
        <p class="subtitle">请登录您的账号</p>

        {% if messages %}
        <ul class="messages">
            {% for message in messages %}
            <li class="{{ message.tags }}">{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="form-group">
                <label>{{ field.label }}</label>
                {{ field }}
                {% for error in field.errors %}
                <div class="help-text" style="color:var(--danger)">{{ error }}</div>
                {% endfor %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary btn-lg">登 录</button>
        </form>
        <div class="auth-link">
            还没有账号？<a href="{% url 'accounts:register' %}">立即注册</a>
        </div>
    </div>
</div>
</body>
</html>
