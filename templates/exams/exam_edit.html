{% extends 'base.html' %}

{% block title %}编辑试卷 - 在线考试系统{% endblock %}

{% block content %}
<div class="page-header">
    <h1>编辑试卷：{{ exam.title }}</h1>
</div>

<div class="card" style="max-width:640px">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="form-group">
                <label>{{ field.label }}</label>
                {{ field }}
                {% for error in field.errors %}
                <div class="help-text" style="color:var(--danger)">{{ error }}</div>
                {% endfor %}
            </div>
            {% endfor %}
            <div style="margin-top:24px;display:flex;gap:8px">
                <button type="submit" class="btn btn-primary">保存修改</button>
                <a href="{% url 'exams:exam_list' %}" class="btn btn-outline">取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
